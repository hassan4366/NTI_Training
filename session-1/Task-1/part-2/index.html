<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doctor Appointment</title>
</head>
<body>
    <div class="parent">
        <div class="child-1">
            <img src="img/Capture.PNG" alt="photo doctor" />
        </div>
        <div class="child-2">
            <h1>Doctor Appointment Form</h1>
            <hr>
            <form>

                <label for="date">Appointment Date</label>
                <input type="date" id="date" name="date" required><br><br>

                <label for="time">Appointment Time</label>
                <input type="time" id="time" name="time" required><br><br>

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="First Name" required>
                <input type="text" id="name" name="name" placeholder="Last Name" required><br><br>

                <label for="gender">Gender</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label><br><br>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" required><br><br> 


                <label for="address">Address:</label>
                <input type="text" id="address" name="address" placeholder="City" required>
                <input type="text" id="address" name="address" placeholder="Street" required><br><br>


                <label for="query">Your Query:</label>
                <textarea id="query" name="query" rows="4" cols="34" placeholder="Please describe your issue..." required></textarea><br><br>

                <label for="appointment">Appointment Type</label>
                <span>Select which appointment type you require</span><br><br>
                <input type="checkbox" id="general" name="appointment" value="general">
                <label for="general">cervix Checkup</label><br>
                <input type="checkbox" id="specialist" name="appointment" value="specialist">
                <label for="specialist">Heart Checkup</label><br>
                <input type="checkbox" id="emergency" name="appointment" value="emergency">
                <label for="emergency">eye Check-up</label><br>
                <input type="checkbox" name="health" id="health checkup" value="health">
                <label for="health checkup">Hearing Checkup</label><br><br>

                <button type="submit" >Send</button>

        </div>
    </div>
</body>
</html>
